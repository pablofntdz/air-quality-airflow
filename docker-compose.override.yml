
services:
  project_db:
    image: postgres:16
    container_name: project_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: project_db
    ports:
      - "5433:5432"
    volumes:
      - project_db_data:/var/lib/postgresql/data
    networks:
      - airflow_net
  minio:
    image: minio/minio
    container_name: minio
    restart: always
    ports:
      - "9000:9000"   
      - "9001:9001"   
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - airflow_net


networks:
  airflow_net:
    external: true
    name: project-air-quality-traffic_36119f_airflow

volumes:
  project_db_data:
  minio_data: